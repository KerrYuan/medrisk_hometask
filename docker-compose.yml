services:
  db:
    image: postgres:16-alpine
    container_name: medrisk_hometask_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: medrisk
      POSTGRES_USER: medrisk
      POSTGRES_PASSWORD: medrisk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medrisk -d medrisk"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    container_name: medrisk_hometask_api
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: dev-only-secret-key
      POSTGRES_DB: medrisk
      POSTGRES_USER: medrisk
      POSTGRES_PASSWORD: medrisk
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: medrisk_hometask_frontend
    restart: unless-stopped
    command: npm run dev -- --hostname 0.0.0.0
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
      NEXT_INTERNAL_API_BASE_URL: http://api:8000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  postgres_data:
